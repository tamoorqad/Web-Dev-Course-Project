<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — WorkSpace</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">Work<span>Space</span></a>
    <nav>
      <a href="properties.html" class="nav-hidden-mobile">Browse</a>
      <a href="login.html"  id="nav-login">Login</a>
      <a href="signup.html" id="nav-signup" class="nav-btn">Sign Up</a>
      <a href="#" id="nav-logout" onclick="logoutUser()" style="display:none;">Logout</a>
    </nav>
  </header>

  <main>
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="sub">Log in to manage your workspace.</p>

        <div id="message" class="message"></div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" />
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">Log In</button>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 WorkSpace</p>
  </footer>
  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
