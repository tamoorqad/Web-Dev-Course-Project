<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Workspace — WorkSpace</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">Work<span>Space</span></a>
    <nav>
      <span class="nav-user" id="nav-username"></span>
      <div id="nav-owner-links" class="flex gap-1">
        <a href="add-property.html">Add Property</a>
        <a href="add-workspace.html">Add Workspace</a>
      </div>
      <a href="properties.html">My Listings</a>
      <a href="login.html"  id="nav-login">Login</a>
      <a href="signup.html" id="nav-signup" class="nav-btn">Sign Up</a>
      <a href="#" id="nav-logout" onclick="logoutUser()" style="display:none;">Logout</a>
    </nav>
  </header>

  <main>
    <div class="form-wrap">
      <h1 class="page-title">Add Workspace</h1>
      <p class="page-subtitle">List a workspace for rent under one of your properties.</p>

      <div id="message" class="message"></div>

      <div class="card">

        <!-- Property Selector -->
        <div class="form-group">
          <label for="propertyId">Select Property</label>
          <select id="propertyId">
            <option value="">— Choose a property —</option>
          </select>
          <p class="text-muted text-sm mt-1">
            Don't see your property? <a href="add-property.html">Add one first.</a>
          </p>
        </div>

        <!-- Workspace Type -->
        <div class="form-group">
          <label for="type">Workspace Type</label>
          <select id="type">
            <option value="">— Select type —</option>
            <option value="meeting">Meeting Room</option>
            <option value="private">Private Office</option>
            <option value="desk">Open Desk</option>
          </select>
        </div>

        <!-- Seats + Price -->
        <div class="form-row">
          <div class="form-group">
            <label for="seats">Seats (Capacity)</label>
            <input type="number" id="seats" placeholder="e.g. 4" min="1" />
          </div>
          <div class="form-group">
            <label for="price">Price (CAD $)</label>
            <input type="number" id="price" placeholder="e.g. 150" min="0" step="0.01" />
          </div>
        </div>

        <!-- Lease Term + Availability -->
        <div class="form-row">
          <div class="form-group">
            <label for="leaseTerm">Lease Term</label>
            <select id="leaseTerm">
              <option value="">— Select term —</option>
              <option value="day">Per Day</option>
              <option value="week">Per Week</option>
              <option value="month">Per Month</option>
            </select>
          </div>
          <div class="form-group">
            <label for="availabilityDate">Available From</label>
            <input type="date" id="availabilityDate" />
          </div>
        </div>

        <!-- Smoking -->
        <div class="form-group">
          <label>Smoking Policy</label>
          <div class="checkbox-group mt-1">
            <input type="checkbox" id="smoking" />
            <label for="smoking">Smoking is allowed in this workspace</label>
          </div>
        </div>

        <button class="btn btn-primary" onclick="handleAddWorkspace()">Add Workspace</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 WorkSpace</p>
  </footer>
  <script src="js/data.js"></script>
  <script src="js/add-workspace.js"></script>
</body>
</html>
